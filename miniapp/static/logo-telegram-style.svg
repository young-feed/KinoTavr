<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background circle (Telegram style) -->
  <circle cx="256" cy="256" r="256" fill="white"/>

  <!-- Outer gradient circle -->
  <circle cx="256" cy="256" r="220" fill="url(#telegramGradient)"/>

  <!-- Inner white circle for contrast -->
  <circle cx="256" cy="256" r="190" fill="white"/>

  <!-- Film icon shape -->
  <g transform="translate(256, 256)">
    <!-- Main rectangle -->
    <rect x="-90" y="-70" width="180" height="140" rx="8" fill="url(#iconGradient)"/>

    <!-- Film strip holes left -->
    <rect x="-80" y="-55" width="12" height="12" rx="3" fill="white" opacity="0.9"/>
    <rect x="-80" y="-25" width="12" height="12" rx="3" fill="white" opacity="0.9"/>
    <rect x="-80" y="5" width="12" height="12" rx="3" fill="white" opacity="0.9"/>
    <rect x="-80" y="35" width="12" height="12" rx="3" fill="white" opacity="0.9"/>

    <!-- Film strip holes right -->
    <rect x="68" y="-55" width="12" height="12" rx="3" fill="white" opacity="0.9"/>
    <rect x="68" y="-25" width="12" height="12" rx="3" fill="white" opacity="0.9"/>
    <rect x="68" y="5" width="12" height="12" rx="3" fill="white" opacity="0.9"/>
    <rect x="68" y="35" width="12" height="12" rx="3" fill="white" opacity="0.9"/>

    <!-- Center play icon -->
    <circle cx="0" cy="0" r="35" fill="white"/>
    <path d="M-8 -18 L-8 18 L22 0 Z" fill="url(#playGradient)"/>
  </g>

  <!-- Subtle shadow effect -->
  <circle cx="256" cy="256" r="220" fill="url(#shadowGradient)" opacity="0.1"/>

  <!-- Gradients matching Telegram style -->
  <defs>
    <linearGradient id="telegramGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2AABEE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229ED9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2AABEE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2AABEE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229ED9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="shadowGradient">
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>
