<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кинотавр 🎬</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <button class="header-btn" id="historyBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M13 3C13 2.44772 12.5523 2 12 2C11.4477 2 11 2.44772 11 3V12C11 12.5523 11.4477 13 12 13H21C21.5523 13 22 12.5523 22 12C22 11.4477 21.5523 11 21 11H13V3Z" fill="currentColor"/>
                    <path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <h1 class="app-title">Кинотавр</h1>
            <button class="header-btn" id="resetBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M4 12C4 7.58172 7.58172 4 12 4C14.5264 4 16.7792 5.17108 18.2454 7M20 12C20 16.4183 16.4183 20 12 20C9.47362 20 7.22075 18.8289 5.75463 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M18 3V7H14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M6 21V17H10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </header>

        <!-- Main Chat View -->
        <main class="main-view" id="chatView">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <img src="/static/logo.svg" alt="Кинотавр" class="bot-logo">
                    <h2>Привет! Я Кинотавр</h2>
                    <p>Расскажи, какое у тебя сейчас настроение, или чего хочется от фильма на вечер?</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Напиши сообщение..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- History View -->
        <aside class="history-view" id="historyView">
            <div class="history-header">
                <button class="back-btn" id="backBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h2>История фильмов</h2>
            </div>
            <div class="history-tabs">
                <button class="history-tab active" data-tab="all">Все</button>
                <button class="history-tab" data-tab="favorites">Избранное</button>
            </div>
            <div class="history-container" id="historyContainer">
                <div class="empty-history">
                    <div class="empty-icon">📽️</div>
                    <p>История пока пуста</p>
                    <span>Найденные фильмы будут отображаться здесь</span>
                </div>
            </div>
        </aside>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
