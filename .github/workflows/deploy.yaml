name: Deploy KinoTavr Bot

# Пайплайн запускается автоматически при каждом push в ветку main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Подключение к серверу по SSH и деплой
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Переходим в папку с проектом на сервере
            cd /var/jenkins_home/workspace/
            
            # 2. Сбрасываем локальные изменения (если они были) и качаем свежий код
            git reset --hard HEAD
            git pull origin main

            echo "${{ secrets.ENV }}" > .env
            
            # 3. Пересобираем и запускаем контейнеры
            # Здесь Docker на хосте отработает штатно, без багов с флагами
            docker compose down
            docker compose up -d --build